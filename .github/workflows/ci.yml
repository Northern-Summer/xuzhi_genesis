name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-seconds: 300
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "*/venvs/*" | xargs -I{} python3 -m py_compile {} 2>&1 || true

      - name: Markdown trailing newline check
        run: |
          find . -name "*.md" -type f -not -path "./.git/*" -not -path "./node_modules/*" -not -path "./seeds/*" -not -path "./knowledge/*" -not -path "*/venvs/*" 2>/dev/null | while IFS= read -r f; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              last_char=$(tail -c 1 "$f" 2>/dev/null | xxd -p 2>/dev/null | tr -d '\n')
              if [ "$last_char" != "0a" ] && [ -n "$last_char" ]; then
                echo "FAIL: $f missing trailing newline"
                exit 1
              fi
            fi
          done || true
          echo "OK: Markdown trailing newline check done"

      - name: Shell syntax check
        run: find . -name "*.sh" -not -path "./.git/*" | xargs -I{} bash -n {} 2>&1 || true

  notify:
    runs-on: ubuntu-latest
    needs: [lint]
    if: always()
    steps:
      - name: Discord notification
        if: vars.DISCORD_WEBHOOK != ''
        run: |
          STATUS="${{ needs.lint.result == 'success' && '✅ SUCCESS' || '❌ FAILURE' }}"
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"[xuzhi_genesis] CI $STATUS\nCommit: $GITHUB_SHA\nRepo: $GITHUB_REPOSITORY\"}" \
            "${{ vars.DISCORD_WEBHOOK }}" 2>/dev/null || true
        shell: bash
