name: CD

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'seeds/**'
      - 'knowledge/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    timeout-seconds: 60
    steps:
      - uses: actions/checkout@v4

      - name: Deployment marker
        if: vars.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"[xuzhi_genesis] ✅ Master deployed\nCommit: $GITHUB_SHA\"}" \
            "${{ vars.DISCORD_WEBHOOK }}" 2>/dev/null || true
